<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arquitetura de Mercado | Curvas EUA</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071324;
        --surface: #0f2037;
        --surface-2: #142b48;
        --ink: #f3f8ff;
        --muted: #aab8ca;
        --line: rgba(222, 233, 247, 0.16);
        --nominal: #48d6e9;
        --real: #c49bff;
        --inflation: #ffae6b;
        --positive: #7ee6a5;
        --negative: #ff8b86;
        --focus: #48d6e9;
        --nominal-soft: rgba(72, 214, 233, 0.16);
        --real-soft: rgba(196, 155, 255, 0.16);
        --inflation-soft: rgba(255, 174, 107, 0.16);
        --focus-soft: rgba(72, 214, 233, 0.14);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(7, 19, 36, 0.96), rgba(6, 15, 29, 0.98)),
          radial-gradient(circle at top left, rgba(72, 214, 233, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 174, 107, 0.1), transparent 30%),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        padding: 22px 0 18px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--focus);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        max-width: 980px;
        margin: 0;
        font-size: clamp(34px, 5vw, 70px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .lead {
        max-width: 920px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
      }

      .market-stamp {
        display: grid;
        gap: 8px;
        min-width: 260px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.88);
        box-shadow: var(--shadow);
      }

      .market-stamp span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .market-stamp strong {
        font-size: 30px;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.88);
        box-shadow: var(--shadow);
      }

      .controls {
        position: sticky;
        top: 16px;
        display: grid;
        gap: 18px;
        align-self: start;
        padding: 16px;
      }

      .control-block {
        display: grid;
        gap: 10px;
      }

      .control-title,
      .mini-label {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        font-weight: 800;
        text-transform: uppercase;
      }

      .segmented,
      .check-grid {
        display: grid;
        gap: 7px;
      }

      .segmented button,
      .maturity-toggle,
      .ghost-btn {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 750;
      }

      .segmented button[aria-pressed="true"] {
        border-color: var(--active-color);
        background: var(--active-soft);
        color: var(--active-color);
      }

      .maturity-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
      }

      .maturity-toggle input {
        width: 18px;
        height: 18px;
        accent-color: var(--focus);
      }

      .range-pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .range-pair label {
        display: grid;
        gap: 6px;
      }

      .range-pair input,
      select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 9px;
        background: var(--surface);
        color: var(--ink);
      }

      .ghost-btn {
        width: 100%;
      }

      .content {
        display: grid;
        gap: 18px;
      }

      .kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .kpi {
        min-height: 142px;
        padding: 16px;
      }

      .kpi span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .kpi strong {
        display: block;
        margin-top: 13px;
        font-size: clamp(24px, 2.2vw, 34px);
        line-height: 1;
      }

      .kpi p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.4;
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.42fr) minmax(330px, 0.78fr);
        gap: 18px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        padding: 16px 16px 0;
      }

      .section-head h2 {
        margin: 4px 0 0;
        font-size: 22px;
      }

      .chart-wrap {
        padding: 8px 10px 12px;
      }

      .chart {
        width: 100%;
        min-height: 390px;
        overflow: visible;
      }

      .axis-label,
      .tick {
        fill: var(--muted);
        font-size: 21px;
        font-weight: 700;
      }

      .point-value-label {
        font-size: 19px;
        font-weight: 900;
        paint-order: stroke;
        pointer-events: none;
        stroke: var(--bg);
        stroke-linejoin: round;
        stroke-width: 5px;
      }

      .grid-line {
        stroke: rgba(222, 233, 247, 0.16);
        stroke-width: 1;
      }

      .curve-line {
        fill: none;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .point {
        stroke: var(--surface);
        stroke-width: 3;
        transition: r 140ms ease, opacity 140ms ease;
      }

      .point-hotspot {
        fill: transparent;
        pointer-events: none;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 16px 16px;
      }

      .legend button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 700;
        opacity: 0.55;
      }

      .legend button[aria-pressed="true"] {
        opacity: 1;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--swatch);
      }

      .reading {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .reading-item {
        border-left: 4px solid var(--tone);
        padding: 12px 12px 12px 14px;
        background: var(--soft);
      }

      .reading-item h3 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .reading-item p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .reading-item ul {
        display: grid;
        gap: 7px;
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.35;
      }

      .reading-item li::marker {
        color: var(--tone);
      }

      .tables-grid {
        display: none;
      }

      .spread-list {
        display: grid;
        gap: 10px;
        padding: 28px 16px 16px;
      }

      .spread-row {
        display: grid;
        grid-template-columns: 94px 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .spread-track {
        height: 10px;
        border-radius: 999px;
        background: rgba(222, 233, 247, 0.14);
        overflow: hidden;
      }

      .spread-fill {
        width: var(--w);
        height: 100%;
        border-radius: inherit;
        background: var(--tone);
      }

      .spread-value {
        font-weight: 800;
        color: var(--tone);
      }

      .diagnosis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        padding: 16px;
      }

      .diag-item {
        min-height: 156px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .diag-item h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .diag-item p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .allocation {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.75fr);
        gap: 18px;
      }

      .benefits {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 16px;
      }

      .benefit {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        min-height: 56px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(126, 230, 165, 0.08);
      }

      .benefit b {
        color: var(--positive);
      }

      .callout {
        margin: 16px;
        padding: 16px;
        border: 1px solid rgba(72, 214, 233, 0.32);
        border-radius: 8px;
        background: var(--focus-soft);
      }

      .callout h3 {
        margin: 0 0 8px;
      }

      .callout p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      footer {
        padding: 10px 0 4px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 1120px) {
        .layout,
        .main-grid,
        .allocation,

        .controls {
          position: static;
        }

        .kpis,
        .diagnosis {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .app {
          padding: 16px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .kpis,
        .diagnosis,
        .benefits {
          grid-template-columns: 1fr;
        }

        .section-head {
          flex-direction: column;
        }

        .chart {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useState } = React;

      const MATURITIES = [
        { key: "2Y", years: 2 },
        { key: "5Y", years: 5 },
        { key: "7Y", years: 7 },
        { key: "10Y", years: 10 },
        { key: "30Y", years: 30 },
      ];

      const CURVES = {
        nominal: {
          label: "Curva Nominal",
          short: "Nominal",
          color: "#48d6e9",
          unit: "%",
          values: { "2Y": 4.23, "5Y": 4.28, "7Y": 4.38, "10Y": 4.51, "30Y": 4.95 },
          reading:
            "A curva voltou a apresentar inclinação positiva, mas a maior parte do movimento está concentrada na ponta longa. O mercado exige prêmio crescente para financiar o governo americano em horizontes mais extensos.",
        },
        real: {
          label: "Curva Real - TIPS",
          short: "Real",
          color: "#c49bff",
          unit: "%",
          values: { "2Y": 1.82, "5Y": 1.96, "7Y": 2.07, "10Y": 2.21, "30Y": 2.7 },
          reading:
            "A principal fonte de inclinação da curva americana está nos juros reais. O investidor volta a receber remuneração real significativa sem necessidade de assumir risco corporativo.",
        },
        inflation: {
          label: "Inflação Implícita",
          short: "Fisher",
          color: "#ffae6b",
          unit: "%",
          values: { "2Y": 2.37, "5Y": 2.28, "7Y": 2.27, "10Y": 2.25, "30Y": 2.19 },
          reading:
            "As expectativas de inflação permanecem bem ancoradas. A inflação implícita cai gradualmente ao longo da curva, sugerindo confiança na convergência para níveis próximos da meta do Federal Reserve.",
        },
      };

      const READING_BULLETS = {
        nominal: [
          "Inclinação positiva voltou.",
          "Movimento concentrado na ponta longa.",
          "Prêmio maior para horizontes extensos.",
        ],
        real: [
          "Inclinação vem dos juros reais.",
          "Remuneração real voltou a ser relevante.",
          "Carrego sem risco corporativo.",
        ],
        inflation: [
          "Expectativas seguem ancoradas.",
          "Inflação implícita cai na curva.",
          "Convergência para perto da meta.",
        ],
      };

      const SPREADS = [
        { label: "5s2s", from: "2Y", to: "5Y" },
        { label: "10s2s", from: "2Y", to: "10Y" },
        { label: "30s10s", from: "10Y", to: "30Y" },
      ];

      const DIAGNOSIS = [
        {
          title: "O problema não é inflação",
          text: "A inflação implícita permanece concentrada entre 2,19% e 2,37%, sem sinais de desancoragem de longo prazo.",
        },
        {
          title: "Juros reais elevados",
          text: "O aumento dos yields nominais é explicado principalmente pela elevação dos juros reais e do prêmio de prazo.",
        },
        {
          title: "Duration exige convicção",
          text: "A maior parte da inclinação está entre 10 e 30 anos, exatamente onde o risco de duration é mais elevado.",
        },
      ];

      const BENEFITS = [
        "Proteção contra inflação realizada.",
        "Juros reais positivos.",
        "Duration reduzida, em torno de 2,3 anos.",
        "Menor volatilidade.",
        "Menor dependência do timing dos cortes do Federal Reserve.",
        "Adaptação natural para investidores acostumados a carrego.",
      ];

      function pct(value) {
        return `${value.toFixed(2).replace(".", ",")}%`;
      }

      function bps(value) {
        const rounded = Math.round(value * 100);
        return `${rounded > 0 ? "+" : ""}${rounded} bps`;
      }

      function curveRows(activeCurves, maturities) {
        return maturities.map((maturity) => {
          const row = { maturity: maturity.key };
          activeCurves.forEach((curveKey) => {
            row[curveKey] = CURVES[curveKey].values[maturity.key];
          });
          return row;
        });
      }

      function spreadValue(curveKey, spread) {
        return CURVES[curveKey].values[spread.to] - CURVES[curveKey].values[spread.from];
      }

      function Chart({ activeCurves, filteredMaturities, mode }) {
        const width = 920;
        const height = 470;
        const margin = { top: 46, right: 138, bottom: 68, left: 78 };
        const plotW = width - margin.left - margin.right;
        const plotH = height - margin.top - margin.bottom;

        const allValues = activeCurves.flatMap((curveKey) =>
          filteredMaturities.map((m) => CURVES[curveKey].values[m.key])
        );
        const min = Math.min(...allValues, 0);
        const max = Math.max(...allValues, 1);
        const pad = Math.max(0.15, (max - min) * 0.12);
        const yMin = 1.5;
        const yMax = max + pad;

        const x = (index) =>
          filteredMaturities.length === 1
            ? margin.left + plotW / 2
            : margin.left + (index / (filteredMaturities.length - 1)) * plotW;
        const y = (value) => margin.top + (1 - (value - yMin) / (yMax - yMin)) * plotH;
        const yTicks = Array.from({ length: 5 }, (_, index) => yMin + ((yMax - yMin) / 4) * index);

        return React.createElement(
          "svg",
          { className: "chart", viewBox: `0 0 ${width} ${height}`, role: "img" },
          yTicks.map((tick) =>
            React.createElement(
              "g",
              { key: tick },
              React.createElement("line", {
                className: "grid-line",
                x1: margin.left,
                x2: width - margin.right,
                y1: y(tick),
                y2: y(tick),
              })
            )
          ),
          filteredMaturities.map((maturity, index) =>
            React.createElement(
              "text",
              {
                key: maturity.key,
                className: "tick",
                x: x(index),
                y: height - 30,
                textAnchor: "middle",
                fontWeight: 700,
              },
              maturity.key
            )
          ),
          activeCurves.map((curveKey) => {
            const points = filteredMaturities.map((m, index) => ({
              maturity: m.key,
              value: CURVES[curveKey].values[m.key],
              x: x(index),
              y: y(CURVES[curveKey].values[m.key]),
            }));
            const labelOffset = curveKey === "real" ? 26 : -18;
            const d = points.map((p, index) => `${index ? "L" : "M"} ${p.x} ${p.y}`).join(" ");
            return React.createElement(
              "g",
              { key: curveKey },
              React.createElement("path", {
                className: "curve-line",
                d,
                stroke: CURVES[curveKey].color,
                opacity: 1,
              }),
              points.map((point) =>
                React.createElement(
                  "g",
                  { key: `${curveKey}-${point.maturity}` },
                  React.createElement("circle", {
                    className: "point",
                    cx: point.x,
                    cy: point.y,
                    r: 6,
                    fill: CURVES[curveKey].color,
                    opacity: 1,
                  }),
                  React.createElement(
                    "text",
                    {
                      className: "point-value-label",
                      x: point.x,
                      y: point.y + labelOffset,
                      fill: CURVES[curveKey].color,
                      opacity: 1,
                      textAnchor: "middle",
                    },
                    pct(point.value)
                  ),
                  React.createElement("circle", {
                    className: "point-hotspot",
                    cx: point.x,
                    cy: point.y,
                    r: 18,
                  })
                )
              )
            );
          })
        );
      }

      function App() {
        const [mode, setMode] = useState("all");

        const activeCurves = mode === "all" ? ["nominal", "real", "inflation"] : [mode];
        const kpiCurveKey = mode === "all" ? "nominal" : mode;
        const kpiCurve = CURVES[kpiCurveKey];
        const filteredMaturities = MATURITIES;

        const nominalLongPremium = spreadValue("nominal", SPREADS[2]);
        const realLongPremium = spreadValue("real", SPREADS[2]);
        const selected = null;
        const selectedRows = [];
        const setSelected = () => {};

        return React.createElement(
          "div",
          { className: "app" },
          React.createElement(
            "header",
            { className: "topbar" },
            React.createElement(
              "section",
              null,
              React.createElement("p", { className: "eyebrow" }, "Arquitetura de Mercado"),
              React.createElement("h1", null, "O retorno livre de risco voltou a competir por capital"),
              React.createElement(
                "p",
                { className: "lead" },
                "Curvas de Treasuries, TIPS e inflação implícita conectadas a tabelas e spreads para separar inflação, juros reais e prêmio de duration."
              )
            ),
            React.createElement(
              "aside",
              { className: "market-stamp" },
              React.createElement("span", null, "Tese central"),
              React.createElement("strong", null, "Carry"),
              React.createElement("span", null, "Duration moderada (2.3y)")
            )
          ),
          React.createElement(
            "main",
            { className: "layout" },
            React.createElement(
              "aside",
              { className: "controls panel" },
              React.createElement(
                "div",
                { className: "control-block" },
                React.createElement("div", { className: "control-title" }, "Visão"),
                React.createElement(
                  "div",
                  {
                    className: "segmented",
                    style: {
                      "--active-color": mode === "all" ? "#0f6d7a" : CURVES[mode].color,
                      "--active-soft":
                        mode === "all"
                          ? "var(--nominal-soft)"
                          : mode === "nominal"
                            ? "var(--nominal-soft)"
                            : mode === "real"
                              ? "var(--real-soft)"
                              : "var(--inflation-soft)",
                    },
                  },
                  ["all", "nominal", "real", "inflation"].map((key) =>
                    React.createElement(
                      "button",
                      {
                        key,
                        type: "button",
                        "aria-pressed": mode === key,
                        onClick: () => setMode(key),
                      },
                      key === "all" ? "Todas" : key === "inflation" ? "Inflação Implícita" : CURVES[key].short
                    )
                  )
                )
              )
            ),
            React.createElement(
              "section",
              { className: "content" },
              React.createElement(
                "section",
                { className: "kpis" },
                React.createElement(
                  "article",
                  { className: "kpi panel" },
                  React.createElement("span", null, `${kpiCurve.short} 5s2s`),
                  React.createElement("strong", null, bps(spreadValue(kpiCurveKey, SPREADS[0]))),
                  React.createElement("p", null, `Inclinação curta da curva ${kpiCurve.short}.`)
                ),
                React.createElement(
                  "article",
                  { className: "kpi panel" },
                  React.createElement("span", null, `${kpiCurve.short} 10s2s`),
                  React.createElement("strong", null, bps(spreadValue(kpiCurveKey, SPREADS[1]))),
                  React.createElement("p", null, `Inclinação intermediária da curva ${kpiCurve.short}.`)
                ),
                React.createElement(
                  "article",
                  { className: "kpi panel" },
                  React.createElement("span", null, `${kpiCurve.short} 30s10s`),
                  React.createElement("strong", null, bps(spreadValue(kpiCurveKey, SPREADS[2]))),
                  React.createElement("p", null, `Ponta longa da curva ${kpiCurve.short}.`)
                )
              ),
              React.createElement(
                "section",
                { className: "main-grid" },
                React.createElement(
                  "article",
                  { className: "panel" },
                  React.createElement(
                    "div",
                    { className: "section-head" },
                    React.createElement(
                      "div",
                      null,
                      React.createElement("span", { className: "control-title" }, "O que o mercado está dizendo?"),
                      React.createElement("h2", null, mode === "all" ? "Curvas conectadas" : CURVES[mode].label)
                    ),
