<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arquitetura de Mercado | Curvas EUA</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071324;
        --surface: #0f2037;
        --surface-2: #142b48;
        --ink: #f3f8ff;
        --muted: #aab8ca;
        --line: rgba(222, 233, 247, 0.16);
        --nominal: #48d6e9;
        --real: #c49bff;
        --inflation: #ffae6b;
        --positive: #7ee6a5;
        --negative: #ff8b86;
        --focus: #48d6e9;
        --nominal-soft: rgba(72, 214, 233, 0.16);
        --real-soft: rgba(196, 155, 255, 0.16);
        --inflation-soft: rgba(255, 174, 107, 0.16);
        --focus-soft: rgba(72, 214, 233, 0.14);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(7, 19, 36, 0.96), rgba(6, 15, 29, 0.98)),
          radial-gradient(circle at top left, rgba(72, 214, 233, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 174, 107, 0.1), transparent 30%),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        padding: 22px 0 18px;
      }

      .view-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 12px;
      }

      .view-tab {
        min-height: 34px;
        border: 1px solid rgba(72, 214, 233, 0.42);
        border-radius: 8px;
        padding: 7px 12px;
        background: var(--nominal-soft);
        color: var(--focus);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .view-tab[aria-current="page"] {
        box-shadow: inset 0 -2px 0 var(--focus);
      }

      h1 {
        max-width: 980px;
        margin: 0;
        font-size: clamp(30px, 4.1vw, 58px);
        line-height: 1;
        letter-spacing: 0;
      }

      .lead {
        max-width: 920px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
      }

      .market-stamp {
        display: grid;
        gap: 8px;
        min-width: 260px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.88);
        box-shadow: var(--shadow);
      }

      .market-stamp span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .market-stamp strong {
        font-size: 30px;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.88);
        box-shadow: var(--shadow);
      }

      .controls {
        position: sticky;
        top: 16px;
        display: grid;
        gap: 18px;
        align-self: start;
        padding: 16px;
      }

      .control-block {
        display: grid;
        gap: 10px;
      }

      .control-title,
      .mini-label {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        font-weight: 800;
        text-transform: uppercase;
      }

      .segmented,
      .check-grid {
        display: grid;
        gap: 7px;
      }

      .segmented button,
      .maturity-toggle,
      .ghost-btn {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 750;
      }

      .segmented button[aria-pressed="true"] {
        border-color: var(--active-color);
        background: var(--active-soft);
        color: var(--active-color);
      }

      .maturity-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
      }

      .maturity-toggle input {
        width: 18px;
        height: 18px;
        accent-color: var(--focus);
      }

      .range-pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .range-pair label {
        display: grid;
        gap: 6px;
      }

      .range-pair input,
      select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 9px;
        background: var(--surface);
        color: var(--ink);
      }

      .ghost-btn {
        width: 100%;
      }

      .content {
        display: grid;
        gap: 18px;
      }

      .kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .kpi {
        min-height: 142px;
        padding: 16px;
      }

      .kpi span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .kpi strong {
        display: block;
        margin-top: 13px;
        font-size: clamp(24px, 2.2vw, 34px);
        line-height: 1;
      }

      .kpi p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.4;
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.42fr) minmax(330px, 0.78fr);
        gap: 18px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        padding: 16px 16px 0;
      }

      .section-head h2 {
        margin: 4px 0 0;
        font-size: 22px;
      }

      .chart-wrap {
        padding: 8px 10px 12px;
      }

      .chart {
        width: 100%;
        min-height: 390px;
        overflow: visible;
      }

      .axis-label,
      .tick {
        fill: var(--muted);
        font-size: 21px;
        font-weight: 700;
      }

      .point-value-label {
        font-size: 19px;
        font-weight: 900;
        paint-order: stroke;
        pointer-events: none;
        stroke: var(--bg);
        stroke-linejoin: round;
        stroke-width: 5px;
      }

      .grid-line {
        stroke: rgba(222, 233, 247, 0.16);
        stroke-width: 1;
      }

      .curve-line {
        fill: none;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .point {
        stroke: var(--surface);
        stroke-width: 3;
        transition: r 140ms ease, opacity 140ms ease;
      }

      .point-hotspot {
        fill: transparent;
        pointer-events: none;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 16px 16px;
      }

      .legend button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 700;
        opacity: 0.55;
      }

      .legend button[aria-pressed="true"] {
        opacity: 1;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--swatch);
      }

      .reading {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .reading-item {
        border-left: 4px solid var(--tone);
        padding: 12px 12px 12px 14px;
        background: var(--soft);
      }

      .reading-item h3 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .reading-item p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .reading-item ul {
        display: grid;
        gap: 7px;
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.35;
      }

      .reading-item li::marker {
        color: var(--tone);
      }

      .tables-grid {
        display: none;
      }

      .spread-list {
        display: grid;
        gap: 10px;
        padding: 28px 16px 16px;
      }

      .spread-row {
        display: grid;
        grid-template-columns: 94px 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .spread-track {
        height: 10px;
        border-radius: 999px;
        background: rgba(222, 233, 247, 0.14);
        overflow: hidden;
      }

      .spread-fill {
        width: var(--w);
        height: 100%;
        border-radius: inherit;
        background: var(--tone);
      }

      .spread-value {
        font-weight: 800;
        color: var(--tone);
      }

      .diagnosis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        padding: 16px;
      }

      .diag-item {
        min-height: 156px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .diag-item h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .diag-item p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .allocation {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.75fr);
        gap: 18px;
      }

      .benefits {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 16px;
      }

      .benefit {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        min-height: 56px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(126, 230, 165, 0.08);
      }

      .benefit b {
        color: var(--positive);
      }

      .callout {
        margin: 16px;
        padding: 16px;
        border: 1px solid rgba(72, 214, 233, 0.32);
        border-radius: 8px;
        background: var(--focus-soft);
      }

      .callout h3 {
        margin: 0 0 8px;
      }

      .callout p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .content > .panel,
      .content > .allocation {
        display: none;
      }

      .allocation-diagnostic {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .allocation-diagnostic .diagnosis,
      .allocation-diagnostic .benefits {
        padding: 0;
      }

      .allocation-diagnostic .diagnosis {
        grid-template-columns: 1fr;
      }

      .allocation-diagnostic .diag-item {
        min-height: 0;
      }

      .allocation-diagnostic .benefits {
        grid-template-columns: 1fr;
      }

      .selected-excerpt {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: rgba(126, 230, 165, 0.08);
      }

      .selected-excerpt h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .selected-excerpt ul {
        display: grid;
        gap: 8px;
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.35;
      }

      .selected-excerpt li::marker {
        color: var(--positive);
      }

      .equity-layout {
        display: grid;
        gap: 18px;
      }

      .equity-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(330px, 0.8fr);
        gap: 18px;
      }

      .equity-chart-card {
        overflow: hidden;
      }

      .equity-chart-image {
        display: block;
        width: 100%;
        border: 0;
        background: #fff;
      }

      .equity-chart-image {
        height: auto;
      }

      .source-card {
        display: grid;
        align-content: start;
        gap: 12px;
        min-height: 190px;
        padding: 16px;
      }

      .source-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .source-link {
        width: fit-content;
        border: 1px solid rgba(72, 214, 233, 0.42);
        border-radius: 8px;
        padding: 9px 12px;
        background: rgba(19, 119, 133, 0.18);
        color: var(--focus);
        font-size: 12px;
        font-weight: 850;
        text-decoration: none;
        text-transform: uppercase;
      }

      .equity-filter {
        display: flex;
        justify-content: flex-end;
      }

      .equity-filter .segmented {
        display: flex;
        flex-wrap: nowrap;
      }

      .equity-filter .segmented button {
        white-space: nowrap;
      }

      .mega-table-card {
        overflow: hidden;
      }

      .mega-table-wrap {
        overflow-x: auto;
      }

      .mega-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1120px;
      }

      .mega-table th,
      .mega-table td {
        border-top: 1px solid var(--line);
        padding: 13px 14px;
        text-align: left;
        vertical-align: top;
      }

      .mega-table th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .mega-table td {
        color: var(--ink);
        line-height: 1.35;
      }

      .mega-table td:nth-child(2) {
        white-space: nowrap;
        font-weight: 850;
      }

      .mega-table tr.benchmark-row td {
        background: rgba(72, 214, 233, 0.1);
        color: var(--focus);
        font-weight: 850;
      }

      .tech-layout {
        display: grid;
        gap: 18px;
      }

      .tech-main {
        display: grid;
        grid-template-columns: minmax(0, 1.8fr) minmax(300px, 0.58fr);
        gap: 18px;
      }

      .thesis-line {
        margin: 0;
        color: var(--ink);
        font-size: 21px;
        font-weight: 850;
        line-height: 1.25;
      }

      .cycle-table-wrap {
        overflow-x: auto;
      }

      .cycle-table {
        width: 100%;
        min-width: 860px;
        border-collapse: collapse;
      }

      .cycle-table th,
      .cycle-table td {
        border-top: 1px solid var(--line);
        padding: 17px 12px;
        text-align: left;
        vertical-align: middle;
      }

      .cycle-table th {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .cycle-table td:first-child {
        font-weight: 850;
        white-space: nowrap;
      }

      .intensity {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 44px;
        border-radius: 8px;
        padding: 8px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 850;
      }

      .capex-high,
      .capex-very {
        background: rgba(72, 214, 233, 0.18);
        color: #82ebff;
      }

      .risk-mid {
        background: rgba(255, 174, 107, 0.18);
        color: #ffc18f;
      }

      .risk-high,
      .risk-very {
        background: rgba(255, 123, 107, 0.2);
        color: #ff9b8f;
      }

      .winner-high,
      .winner-very {
        background: rgba(126, 230, 165, 0.18);
        color: #9df0ba;
      }

      .unknown {
        background: rgba(170, 184, 202, 0.14);
        color: #c8d3e1;
      }

      .lesson-cell {
        color: var(--muted);
        line-height: 1.35;
      }

      .ai-stack {
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
      }

      .stack-frame {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
        padding: 16px;
      }

      .stack-arrow {
        min-height: 100%;
        background: linear-gradient(180deg, rgba(72, 214, 233, 0.92), rgba(72, 214, 233, 0.16));
        clip-path: polygon(50% 0, 100% 15%, 72% 15%, 72% 100%, 28% 100%, 28% 15%, 0 15%);
        filter: drop-shadow(0 0 14px rgba(72, 214, 233, 0.18));
      }

      .stack-layer {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.04);
      }

      .stack-layer.money-now {
        border-color: rgba(126, 230, 165, 0.42);
        background: rgba(126, 230, 165, 0.1);
      }

      .stack-layer.money-flow {
        border-color: rgba(72, 214, 233, 0.4);
        background: rgba(72, 214, 233, 0.1);
      }

      .stack-layer.money-forming {
        border-color: rgba(255, 174, 107, 0.38);
        background: rgba(255, 174, 107, 0.09);
      }

      .stack-layer.money-future {
        border-color: rgba(170, 184, 202, 0.24);
        background: rgba(170, 184, 202, 0.08);
      }

      .stack-layer strong {
        display: block;
        margin-bottom: 5px;
      }

      .stack-layer span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .money-tag {
        display: inline-flex;
        margin-top: 8px;
        border-radius: 999px;
        padding: 4px 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
        font-size: 10px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .timeline {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
        padding: 16px;
        position: relative;
      }

      .timeline-step {
        position: relative;
        min-height: 82px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.04);
      }

      .timeline-step[aria-current="step"] {
        border-color: var(--focus);
        background: var(--focus-soft);
      }

      .timeline-step.current-zone {
        border-color: rgba(255, 174, 107, 0.52);
        background: rgba(255, 174, 107, 0.09);
      }

      .timeline-marker {
        align-self: center;
        justify-self: center;
        width: 100%;
        border: 1px solid rgba(255, 174, 107, 0.5);
        border-radius: 999px;
        padding: 8px 10px;
        background: rgba(255, 174, 107, 0.12);
        color: #ffc18f;
        font-size: 11px;
        font-weight: 850;
        text-align: center;
        text-transform: uppercase;
      }

      .timeline-note {
        margin: 0;
        padding: 0 16px 16px;
        color: var(--muted);
        line-height: 1.4;
      }

      .timeline-step span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .timeline-step strong {
        display: block;
        margin-top: 6px;
      }

      .policy-table {
        width: 100%;
        min-width: 860px;
        border-collapse: collapse;
      }

      .policy-table th,
      .policy-table td {
        border-top: 1px solid var(--line);
        padding: 13px 14px;
        text-align: left;
        vertical-align: top;
      }

      .policy-table th {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .policy-table td:first-child {
        color: var(--focus);
        font-weight: 850;
        white-space: nowrap;
      }

      .policy-table td {
        color: var(--muted);
        line-height: 1.35;
      }

      .core-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(340px, 0.75fr);
        gap: 18px;
        align-items: start;
      }

      .core-function-grid {
        display: grid;
        gap: 10px;
        padding: 16px;
      }

      .core-function {
        display: grid;
        grid-template-columns: minmax(160px, 0.8fr) minmax(0, 1.2fr);
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.035);
      }

      .core-function h3 {
        margin: 0 0 5px;
        font-size: 15px;
      }

      .core-function p {
        margin: 0;
        color: var(--muted);
        line-height: 1.35;
      }

      .etf-token-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .etf-token {
        min-width: 64px;
        min-height: 38px;
        border: 1px solid rgba(72, 214, 233, 0.28);
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(72, 214, 233, 0.08);
        color: var(--ink);
        font-weight: 850;
      }

      .etf-token.etf-us {
        border-color: rgba(68, 143, 255, 0.48);
        background: rgba(68, 143, 255, 0.14);
        color: #b8d6ff;
      }

      .etf-token.etf-developed {
        border-color: rgba(69, 206, 238, 0.48);
        background: rgba(69, 206, 238, 0.12);
        color: #a9efff;
      }

      .etf-token.etf-emerging {
        border-color: rgba(111, 132, 255, 0.52);
        background: rgba(111, 132, 255, 0.14);
        color: #c4ccff;
      }

      .etf-token.etf-fixed {
        border-color: rgba(58, 166, 163, 0.48);
        background: rgba(58, 166, 163, 0.12);
        color: #ace5e2;
      }

      .etf-token.etf-other {
        border-color: rgba(224, 184, 93, 0.42);
        background: rgba(224, 184, 93, 0.1);
        color: #f1d58d;
      }

      .etf-token[aria-pressed="true"] {
        border-color: rgba(255, 118, 118, 0.62);

      function curveRows(activeCurves, maturities) {
        return maturities.map((maturity) => {

      function Chart({ activeCurves, filteredMaturities, mode }) {
        const width = 920;
        const height = 470;
        const margin = { top: 46, right: 138, bottom: 68, left: 78 };
        const plotW = width - margin.left - margin.right;
        const plotH = height - margin.top - margin.bottom;

        const allValues = activeCurves.flatMap((curveKey) =>
          filteredMaturities.map((m) => CURVES[curveKey].values[m.key])
        );
        const min = Math.min(...allValues, 0);
        const max = Math.max(...allValues, 1);
        const pad = Math.max(0.15, (max - min) * 0.12);
        const yMin = 1.5;
        const yMax = max + pad;

        const x = (index) =>
          filteredMaturities.length === 1
            ? margin.left + plotW / 2
            : margin.left + (index / (filteredMaturities.length - 1)) * plotW;
        const y = (value) => margin.top + (1 - (value - yMin) / (yMax - yMin)) * plotH;
        const yTicks = Array.from({ length: 5 }, (_, index) => yMin + ((yMax - yMin) / 4) * index);

        return React.createElement(
          "svg",
          { className: "chart", viewBox: `0 0 ${width} ${height}`, role: "img" },
          yTicks.map((tick) =>
            React.createElement(
              "g",
              { key: tick },
              React.createElement("line", {
                className: "grid-line",
                x1: margin.left,
                x2: width - margin.right,
                y1: y(tick),
                y2: y(tick),
              })
            )
          ),
          filteredMaturities.map((maturity, index) =>
            React.createElement(
              "text",

                key: maturity.key,
                className: "tick",
                x: x(index),
                y: height - 30,

            )

              y: y(CURVES[curveKey].values[m.key]),

            return React.createElement(
